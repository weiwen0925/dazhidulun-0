<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《大智度論》第1-100卷 資源彙編</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif TC', "STKaiti", "KaiTi", serif;
            margin: 0;
            padding: 20px;
            background-color: #382e25; /* 深棕色背景 */
            color: #f5e4cd; /* 淺金白色文字 (預設) */
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* 背景巨型漢字水印 */
        body::after {
            content: '精進';
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 50vw; /* 50% 視區寬度 */
            color: #d9b87c; /* 琥珀金色 */
            opacity: 0.05; /* 非常低的透明度 */
            position: fixed;
            top: 50%;
            right: -20vw;
            transform: translateY(-50%) rotate(-10deg);
            z-index: -1;
            white-space: nowrap;
        }

        .header-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .pinyin-subtitle {
            font-size: 14px;
            color: #f5e4cd; /* 淺金白色 */
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            color: #e3c085; /* 深金色 */
            margin: 0;
            font-size: 3em;
            font-weight: 700;
        }

        h1 small {
            font-size: 0.6em;
            color: #e3c085;
            vertical-align: middle;
            margin-left: 10px;
        }

        /* 資訊塊區域容器 */
        .resource-container {
            max-width: 800px;
            margin: 0 auto 40px;
            text-align: center;
        }

        /* 模仿圖片中文字塊的樣式 */
        .info-block {
            border: 1px solid #d9b87c; /* 琥珀金色邊框 */
            border-radius: 12px;
            padding: 25px;
            background-color: rgba(56, 46, 37, 0.5); /* 半透明深棕色背景 */
            margin-bottom: 30px;
        }

        .info-block p {
            font-size: 16px;
            color: #f5e4cd;
            margin: 0 0 10px 0;
        }

        .info-link {
            font-size: 18px;
            color: #e3c085; /* 深金色連結 */
            text-decoration: underline;
            margin-bottom: 15px;
            display: inline-block;
        }

        .info-link:hover {
            color: #ffffff;
        }

        .verse-block {
            font-size: 16px;
            color: #f5e4cd;
            text-align: center;
            line-height: 1.8;
            margin-top: 15px;
        }

        .verse-block p {
            margin: 0;
        }

        /* 卷數網格容器 - 保持整齊排版 */
        .volume-grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            /* 讓連結自動排版，每個最少150px寬 */
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            text-align: center;
        }
        
        /* 卷數連結按鈕樣式 */
        a.volume-link {
            display: block;
            padding: 15px 10px;
            background-color: transparent; /* 透明背景 */
            color: #d9b87c; /* 琥珀金色文字 */
            text-decoration: none; /* 移除下劃線 */
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #d9b87c; /* 琥珀金色邊框 */
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        a.volume-link:hover {
            background-color: rgba(227, 192, 133, 0.1); /* 極淡的琥珀色背景 */
            color: #ffffff; /* 淺白色文字 */
            border-color: #ffffff; /* 白色邊框 */
        }

        /* 頁尾迴向偈樣式 */
        .footer {
            text-align: center;
            margin-top: 80px;
            font-size: 18px; /* 稍微放大迴向偈字體 */
            color: #e3c085; /* 使用深金色，使其莊嚴 */
            border-top: 1px solid rgba(245, 228, 205, 0.2);
            padding-top: 30px;
            padding-bottom: 30px;
            letter-spacing: 2px; /* 增加字距 */
        }
    </style>
</head>
<body>

    <div class="header-container">
        <p class="pinyin-subtitle">Mahāprajñāpāramitā-śāstra · Full Collection 1-100</p>
        <!-- 標題更新為 1-100 卷 -->
        <h1>《大智度論》第1-100卷<small>資源彙編</small></h1>
    </div>

    <!-- 資訊塊區 -->
    <div class="resource-container">
        <!-- 從圖片中模仿的資訊塊 -->
        <div class="info-block">
            <p>本文為個人研讀彙整，歡迎轉發結緣；轉發請保留連結與作者頻道</p>
            <a class="info-link" href="https://www.youtube.com/@Chengweiwen">https://www.youtube.com/@Chengweiwen</a>
            <div class="verse-block">
                <p>不生亦不滅，不常亦不斷；</p>
                <p>不一亦不異，不來亦不出。</p>
                <p>能說是因緣，善滅諸戲論；</p>
                <p>我稽首禮佛，諸說中第一。</p>
            </div>
        </div>
    </div>

    <!-- 卷數目錄網格區 (文字按鈕) -->
    <div class="volume-grid-container">
        <!-- 1-100 卷連結，僅存文字 -->
        <script>
            // 使用 JavaScript 自動生成 1 到 100 卷的連結
            const container = document.querySelector('.volume-grid-container');
            const baseUrl = 'https://weiwen0925.github.io/dazhidulun-';
            
            for (let i = 1; i <= 100; i++) {
                const link = document.createElement('a');
                link.className = 'volume-link';
                link.href = baseUrl + i + '/';
                link.target = '_blank';
                link.textContent = '第 ' + i + ' 卷';
                container.appendChild(link);
            }
        </script>
    </div>

    <!-- 頁尾迴向偈 -->
    <div class="footer">
        願以此功德，普及於一切，我等與眾生，皆共成佛道。
    </div>

</body>
</html>
